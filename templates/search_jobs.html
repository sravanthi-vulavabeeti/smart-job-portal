<!DOCTYPE html>
<html>
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Search Jobs</title>
</head>
    <body class="bg-light">
<div class="container mt-4">
    <h2 class="mb-4">💼 Available Jobs</h2>
<div class="mb-3">
    <a href="/search_jobs" class="btn btn-secondary">All</a>
    <a href="/search_jobs?category=Software Development" class="btn btn-primary">Software Development</a>
    <a href="/search_jobs?category=DevOps" class="btn btn-success">DevOps</a>
    <a href="/search_jobs?category=Cloud Computing" class="btn btn-info">Cloud Computing</a>
    <a href="/search_jobs?category=Data Science" class="btn btn-warning">Data Science</a>
    <a href="/search_jobs?category=Database" class="btn btn-dark">Database</a>
</div>
<form method="GET" action="/search_jobs">
    <div class="input-group mb-4">
        <input type="text"
               class="form-control"
               name="keyword"
               placeholder="Search jobs..."
               autocomplete="off">

        <button class="btn btn-primary" type="submit">
            🔍 Search
        </button>
    </div>
</form>
    <input type="text" name="keyword" placeholder="Search jobs...">
    <button type="submit">Search</button>
</form>

<br>

<hr>

<div>
    {% for job in jobs %}

<div class="card shadow-sm mb-4 p-3">
    <h3> 
        <a class="text-decoration-none" href="/job/{{ loop.index0 }}">
            {{ job.title}}
        </a>
    </h3>      
    <p><strong>Company:</strong> {{ job.company }}</p>
    <p><strong>Location:</strong> {{ job.location }}</p>
    <p><strong>Category:</strong>  {{ job.category }}</p>

    <form action="/apply" method="POST">
        <input type="hidden" name="job_title" value="{{ job.title }}">
        <input type="hidden" name="company" value="{{ job.company }}">
        <button type="submit" class="btn
        btn-success me-2">
            Apply
    </button>
    </form>
    <form action="/save_job" method="POST">
    <input type="hidden" name="job_title" value="{{ job.title }}">
    <input type="hidden" name="company" value="{{ job.company }}">
    <button type="submit" class="btn
     btn-warning">
    💾 Save Job
    </button>
</form>
</div>

<hr>

{% endfor %}
